<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — message</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0b0b0c;--card:#1b1b1e;--line:#2b2b2f;--text:#f2f2f0;--dim:#9a9a9e;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;
       display:flex;align-items:center;justify-content:center;padding:24px;}
  .box{width:100%;max-width:640px;}
  h1{font-family:'Anton',sans-serif;font-weight:400;font-size:32px;margin-bottom:6px;}
  .sub{color:var(--dim);font-size:13px;margin-bottom:30px;font-family:'JetBrains Mono',monospace;}
  .lock{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:28px;}
  .lock input{width:100%;padding:14px;border-radius:10px;border:1px solid var(--line);
              background:#141416;color:var(--text);margin-bottom:14px;font-size:14px;}
  .lock button{width:100%;padding:14px;border-radius:10px;border:none;background:#fff;color:#0b0b0c;
               font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:1px;cursor:pointer;}
  .msg-card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:20px;margin-bottom:14px;}
  .msg-meta{display:flex;justify-content:space-between;color:var(--dim);font-size:12px;
            font-family:'JetBrains Mono',monospace;margin-bottom:10px;}
  .msg-forgive{display:inline-block;font-size:12px;padding:4px 10px;border-radius:999px;
               border:1px solid var(--line);color:var(--text);margin-bottom:10px;}
  .msg-text{font-size:15px;line-height:1.7;white-space:pre-wrap;}
  .empty{color:var(--dim);text-align:center;padding:40px 0;font-size:14px;}
  .note{color:var(--dim);font-size:12px;margin-top:24px;line-height:1.6;}
  #app{display:none;}
  .cloud-badge{display:inline-block;font-size:11px;padding:3px 9px;border-radius:999px;
               border:1px solid var(--line);color:var(--dim);margin-bottom:16px;font-family:'JetBrains Mono',monospace;}
</style>
</head>
<body>
  <div class="box">
    <h1>Panel Admin</h1>
    <p class="sub">PESAN DARI BINTANG EKA</p>

    <div id="lock" class="lock">
      <input type="password" id="pw" placeholder="Masukkan kata sandi">
      <button onclick="unlock()">Buka</button>
    </div>

    <div id="app">
      <span class="cloud-badge" id="sourceBadge">memuat...</span>
      <div id="list"></div>
      <p class="note">
        Kalau kamu sudah mengatur Firebase di js/firebase-config.js, pesan di
        atas terbaca dari cloud dan bisa dibuka dari HP manapun. Kalau belum,
        halaman ini hanya menampilkan pesan yang tersimpan lokal di browser/HP ini.
      </p>
    </div>
  </div>

<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script>
  // Ganti kata sandi ini sesuai keinginanmu
  const ADMIN_PASSWORD = "ceyouka";

  function unlock(){
    const val = document.getElementById('pw').value;
    if(val === ADMIN_PASSWORD){
      document.getElementById('lock').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      render();
    } else {
      alert('Kata sandi salah.');
    }
  }

  function renderList(data, fromCloud){
    const list = document.getElementById('list');
    document.getElementById('sourceBadge').textContent =
      fromCloud ? '☁ tersambung ke cloud (semua perangkat)' : '📱 lokal saja (HP ini)';
    if(data.length === 0){
      list.innerHTML = '<p class="empty">Belum ada pesan yang masuk.</p>';
      return;
    }
    list.innerHTML = data.map(m => `
      <div class="msg-card">
        <div class="msg-meta"><span>${m.time}</span></div>
        <div class="msg-forgive">${m.forgive}</div>
        <div class="msg-text">${(m.message||'').replace(/</g,'&lt;')}</div>
      </div>
    `).join('');
  }

  async function render(){
    if (typeof FIREBASE_ENABLED !== 'undefined' && FIREBASE_ENABLED) {
      try {
        const db = getFirestore();
        const snap = await db.collection('messages').orderBy('created', 'desc').get();
        const data = snap.docs.map(d => d.data());
        renderList(data, true);
        return;
      } catch (err) {
        // gagal ambil dari cloud, jatuh ke data lokal di bawah
      }
    }
    const local = JSON.parse(localStorage.getItem('bintang_eka_messages') || '[]');
    renderList(local.slice().reverse(), false);
  }

  document.getElementById('pw').addEventListener('keydown', e => {
    if(e.key === 'Enter') unlock();
  });
</script>
</body>
</html>
